<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTACT</title>
  <link rel="stylesheet" href="./contact.css">
</head>
<body>
  
  <header>
    <nav>
      <h1 class="logo">arfas</h1>
      <ul>
        <li><a href="./index.html">home</a></li>
        <li><a href="./about.html">about us</a></li>
        <li><a href="./contact.html">contact</a></li>
      </ul>
    </nav>
  </header>
   <!-- Contact Section -->
    <section class="contact-section">

        <div class="overlay"></div>

        <div class="contact-container">

            <h1>Contact</h1>

            <p>
                Drop us a line and we'll be happy to get back to you Monday-Friday.
            </p>

            <form>

                <div class="row">

                    <div class="input-box">
                        <label>FIRST NAME</label>
                        <input type="text" required placeholder="Enter your first name">
                        <img src="" alt="">
                    </div>

                    <div class="input-box">
                        <label>LAST NAME</label>
                        <input type="text" required placeholder="Enter your last name">
                        <img src="" alt="">
                    </div>

                </div>

                <div class="input-box full">
                    <label>EMAIL ADDRESS</label>
                    <input type="email" required placeholder="Enter your email address">
                    <img src="" alt="">
                </div>

                <div class="input-box full">
                    <label>MESSAGE</label>
                    <textarea placeholder="Type your message here..."></textarea>
                    <img src="" alt="" >
                </div>

                <button type="submit">
                    SEND MESSAGE
                </button>

            </form>

        </div>

    </section>

</body>
</html>
